<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes CV</title>
    <style>
        /* Styles de base pour la page */
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        /* Style pour le conteneur des boutons (onglets) */
        .tab {
            overflow: hidden;
            border: 1px solid #ccc;
            background-color: #f1f1f1;
            border-radius: 5px 5px 0 0;
            display: flex; /* Permet un bel alignement */
        }

        /* Style pour les boutons des onglets */
        .tab button {
            background-color: inherit;
            border: none;
            outline: none;
            cursor: pointer;
            padding: 14px 24px;
            transition: 0.3s;
            font-size: 17px;
            flex-grow: 1; /* Les boutons prennent toute la largeur disponible */
        }

        /* Couleur au survol d'un bouton */
        .tab button:hover {
            background-color: #ddd;
        }

        /* Couleur de l'onglet actif (celui qui est cliqué) */
        .tab button.active {
            background-color: #ccc;
            font-weight: bold;
        }

        /* Style pour le contenu des onglets (les iframes) */
        .tabcontent {
            display: none; /* Caché par défaut, géré par le JavaScript */
            padding: 0;
            border: 1px solid #ccc;
            border-top: none;
            height: 80vh; /* Prend 80% de la hauteur de l'écran */
        }

        /* Ajuster les iframes pour qu'elles prennent tout l'espace de l'onglet */
        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <h2>Découvrez mes CV</h2>

    <div class="tab">
      <button class="tablinks active" onclick="openCV(event, 'CV1')">CV Français</button>
      <button class="tablinks" onclick="openCV(event, 'CV2')">CV Anglais</button>
    </div>

    <div id="CV1" class="tabcontent" style="display:block;">
      <iframe src="cv-francais.html" title="CV en Français"></iframe>
    </div>

    <div id="CV2" class="tabcontent">
      <iframe src="cv_theotime.html" title="CV en Anglais"></iframe>
    </div>

    <script>
        function openCV(evt, cvName) {
            var i, tabcontent, tablinks;
            
            // 1. Cacher tout le contenu des onglets
            tabcontent = document.getElementsByClassName("tabcontent");
            for (i = 0; i < tabcontent.length; i++) {
                tabcontent[i].style.display = "none";
            }
            
            // 2. Retirer la classe "active" de tous les boutons
            tablinks = document.getElementsByClassName("tablinks");
            for (i = 0; i < tablinks.length; i++) {
                tablinks[i].className = tablinks[i].className.replace(" active", "");
            }
            
            // 3. Afficher l'onglet cliqué et lui ajouter la classe "active"
            document.getElementById(cvName).style.display = "block";
            evt.currentTarget.className += " active";
        }
    </script>

</body>
</html>
