<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mes CV</title>
    <style>
        /* Centre tout au milieu de la page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh; /* Prend toute la hauteur de l'écran */
            margin: 0;
            background-color: #f4f4f9; /* Couleur de fond très légère */
        }

        h2 {
            color: #333;
            margin-bottom: 30px;
        }

        /* Style pour transformer les liens en beaux boutons */
        .btn-cv {
            display: inline-block;
            margin: 10px 20px;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #007BFF; /* Bleu classique */
            text-decoration: none; /* Enlève le soulignement du lien */
            border-radius: 8px; /* Coins arrondis */
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Petite ombre légère */
            transition: all 0.3s ease;
        }

        /* Effet quand on passe la souris sur le bouton */
        .btn-cv:hover {
            background-color: #0056b3; /* Bleu plus foncé */
            transform: translateY(-2px); /* Fait légèrement remonter le bouton */
            box-shadow: 0 6px 8px rgba(0, 0, 0, 0.15);
        }
    </style>
</head>
<body>

    <h2>Sélectionnez le cv</h2>

    <div>
        <a href="cv_theotime.html" class="btn-cv" target="_blank">Théotime</a>

        <a href="cv_marie.html" class="btn-cv" target="_blank">Marie</a>
    </div>

</body>
</html>
